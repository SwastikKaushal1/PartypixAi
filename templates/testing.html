<!-- VIEW button trigger -->
<button class="action-btn" onclick="openEventModal()">👁 View</button>

<!-- Event Modal Popup -->
<div class="popup-overlay" id="eventModal">
  <div class="container">
    <h1>🌸 Wedding Memories</h1>
    <div class="event-meta">Token Used: <strong>Royal</strong> | ID: 6b17d82b</div>
    <div class="event-desc">
      Celebrate the joy of union with our captured moments. Upload more memories or share this album!
    </div>

    <!-- Upload Photo -->
    <form id="uploadForm" action="/upload_photo" method="POST" enctype="multipart/form-data">
      <input type="file" name="photo" id="photoInput" style="display: none;" onchange="submitUploadForm()" />
      <input type="hidden" name="event_id" value="6b17d82b">
    </form>
    <button class="action-btn" onclick="triggerFileInput()">📤 Upload Photo</button>

    <!-- Generate Link -->
    <button class="action-btn" onclick="openSharePopup()">🔗 Generate Share Link</button>

    <!-- Close Modal -->
    <button class="close-btn" onclick="closeEventModal()">Close</button>
  </div>

  <!-- Share Link Popup Inside Modal -->
  <div class="popup-overlay" id="sharePopup">
    <div class="popup-box">
      <h2>🔗 Share Link Generated!</h2>
      <p>Here’s your event access link and password:</p>
      <p><strong>Link:</strong> <code>https://pixai.app/share/6b17d82b</code></p>
      <p><strong>Password:</strong> <code>WD1234</code></p>
      <button class="close-btn" onclick="closeSharePopup()">Close</button>
    </div>
  </div>
</div>

<!-- Styles (same as before, keep them in place) -->
<style>
  body {
    font-family: 'Poppins', sans-serif;
    background: #0f001a;
    color: white;
  }

  .action-btn {
    display: block;
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    font-size: 1rem;
    background: linear-gradient(90deg, #d47aff, #00eaff);
    color: black;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.3s ease;
    font-weight: bold;
    box-shadow: 0 0 10px #d47aff;
  }

  .action-btn:hover {
    transform: scale(1.03);
    box-shadow: 0 0 20px #ff87e2;
  }

  .close-btn {
    margin-top: 20px;
    padding: 10px 20px;
    background: #ff87e2;
    color: black;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
  }

  .close-btn:hover {
    background: #ffd700;
  }

  .popup-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(4px);
    z-index: 999;
    justify-content: center;
    align-items: center;
  }

  .popup-overlay.active {
    display: flex;
  }

  .container {
    background: #1a0d2e;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 0 20px #3b1e5a;
    width: 90%;
    max-width: 600px;
    text-align: center;
    position: relative;
    animation: popFadeIn 0.3s ease;
  }

  h1 {
    font-size: 2rem;
    color: #d47aff;
    margin-bottom: 10px;
  }

  .event-meta {
    color: #aaa;
    font-size: 0.9rem;
    margin-bottom: 25px;
  }

  .event-desc {
    margin-bottom: 30px;
    font-size: 1rem;
    line-height: 1.6;
    color: #ddd;
  }

  .popup-box {
    background: #1a0d2e;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 0 20px #d47aff;
    max-width: 400px;
    width: 90%;
    text-align: center;
    animation: popFadeIn 0.3s ease;
  }

  @keyframes popFadeIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }

  .popup-box h2 {
    color: #d47aff;
    margin-bottom: 15px;
  }

  .popup-box p {
    color: #ccc;
    font-size: 0.95rem;
    margin: 10px 0;
  }

  .popup-box code {
    background: #2b1847;
    padding: 6px 10px;
    border-radius: 6px;
    display: inline-block;
    color: #ffd700;
    font-size: 0.95rem;
  }
</style>

<!-- Scripts -->
<script>
  function openEventModal() {
    document.getElementById('eventModal').classList.add('active');
  }

  function closeEventModal() {
    document.getElementById('eventModal').classList.remove('active');
    closeSharePopup();
  }

  function openSharePopup() {
    document.getElementById('sharePopup').classList.add('active');
  }

  function closeSharePopup() {
    document.getElementById('sharePopup').classList.remove('active');
  }

  function triggerFileInput() {
    document.getElementById('photoInput').click();
  }

  function submitUploadForm() {
    document.getElementById('uploadForm').submit();
  }
</script>
